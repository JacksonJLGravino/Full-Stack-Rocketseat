<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/index.css" />
    <title>Quicklist</title>
  </head>
  <body>
    <header>
      <img src="assets/logo.svg" alt="Quicklist" />
      <a href="#">quicklist</a>
    </header>

    <main>
      <a href="#" class="back-link">← Voltar</a>

      <h1>Compras da semana</h1>

      <form class="add-item-form">
        <input type="text" placeholder="Adicione um novo item" />

        <button type="submit">Adicionar item</button>
      </form>

      <ul class="shopping-list"></ul>

      <div class="alert hidden">
        <img src="assets/warning-circle-filled.svg" alt="" />
        <p>O item foi removido da lista</p>

        <button class="close-alert">
          <img src="assets/delete-small.svg" alt="" />
        </button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
